# trixie.conf — example configuration for the trixie compositor
# Place this file at: ~/.config/trixie/trixie.conf
#
# All values shown are the built-in defaults unless marked otherwise.
# Lines beginning with # are comments.
# Shell variables are expanded: $HOME, $XDG_CONFIG_HOME, etc.

# ─────────────────────────────────────────────────────────────────────────────
# Theme (sets all colours at once — override individual keys below)
# Valid: catppuccin-mocha, catppuccin-latte, gruvbox, nord, tokyo-night
# ─────────────────────────────────────────────────────────────────────────────
theme = catppuccin-mocha

# ─────────────────────────────────────────────────────────────────────────────
# General
# ─────────────────────────────────────────────────────────────────────────────
font      = /usr/share/fonts/TTF/JetBrainsMono-Regular.ttf
font_size = 14

gap          = 6      # pixels between tiled panes
border_width = 2      # 0 to disable borders entirely
smart_gaps   = true   # hide gaps/borders when only one pane is visible
corner_radius = 0     # pixel rounding (0 = sharp corners)

workspaces   = 9
idle_timeout = 300    # seconds; 0 = never blank

xwayland   = false    # set true to enable XWayland for X11 apps
cursor_theme = default
cursor_size  = 24
seat_name    = seat0

# ─────────────────────────────────────────────────────────────────────────────
# Colour overrides  (hex: 0xRRGGBB or 0xAARRGGBB or #RRGGBB)
# These take effect AFTER the theme preset above.
# ─────────────────────────────────────────────────────────────────────────────
# active_border   = 0xcba6f7   # mauve instead of lavender
# inactive_border = 0x313244

# ─────────────────────────────────────────────────────────────────────────────
# Bar
# ─────────────────────────────────────────────────────────────────────────────
bar {
    position   = bottom   # top | bottom
    height     = 28
    font_size  = 13
    padding    = 10       # horizontal padding for left/right sections
    powerline  = false    # enable  /  powerline triangle separators

    # Module layout — space-separated list of module names
    modules_left   = workspaces layout
    modules_center = clock
    modules_right  = battery network volume cpu memory

    # Custom exec module example:
    # module mystat {
    #     exec     = ~/.local/bin/mystat.sh
    #     interval = 5       # poll interval in seconds
    #     icon     = [*]     # prepended to output (leave empty for none)
    # }
}

# ─────────────────────────────────────────────────────────────────────────────
# Keybinds
# Modifiers: super (Logo key), ctrl, alt, shift
# Key names follow XKB keysym names: Return, space, h, j, k, l, 1-9 …
# ─────────────────────────────────────────────────────────────────────────────
bind {
    # Applications
    super+Return       = exec alacritty
    super+b            = exec firefox
    super+r            = exec fuzzel           # app launcher

    # Window management
    super+q            = close
    super+f            = fullscreen
    super+shift+space  = float
    super+m            = toggle_overlay        # TUI overlay (Super+grave also works)
    super+grave        = toggle_overlay

    # Focus (vim keys)
    super+h            = focus left
    super+l            = focus right
    super+j            = focus down
    super+k            = focus up

    # Move panes
    super+shift+h      = swap back
    super+shift+l      = swap forward
    super+shift+m      = swap_main

    # Resize main pane ratio
    super+equal        = grow_main
    super+minus        = shrink_main

    # Layouts
    super+Tab          = layout next
    super+shift+Tab    = layout prev

    # Workspaces 1–9
    super+1            = workspace 1
    super+2            = workspace 2
    super+3            = workspace 3
    super+4            = workspace 4
    super+5            = workspace 5
    super+6            = workspace 6
    super+7            = workspace 7
    super+8            = workspace 8
    super+9            = workspace 9

    # Move focused window to workspace 1–9
    super+shift+1      = move_to_workspace 1
    super+shift+2      = move_to_workspace 2
    super+shift+3      = move_to_workspace 3
    super+shift+4      = move_to_workspace 4
    super+shift+5      = move_to_workspace 5
    super+shift+6      = move_to_workspace 6
    super+shift+7      = move_to_workspace 7
    super+shift+8      = move_to_workspace 8
    super+shift+9      = move_to_workspace 9

    # Scratchpad (requires a matching scratchpad block below)
    super+shift+Return = scratchpad term

    # Compositor
    super+shift+r      = reload
    super+shift+q      = quit
}

# ─────────────────────────────────────────────────────────────────────────────
# Scratchpads
# ─────────────────────────────────────────────────────────────────────────────
scratchpad term {
    app_id     = org.alacritty   # matched against the window's app_id
    width_pct  = 70              # % of screen width
    height_pct = 45              # % of screen height
    # exec = alacritty           # optional: spawn if not already running
}

# scratchpad notes {
#     app_id     = obsidian
#     width_pct  = 80
#     height_pct = 80
# }

# ─────────────────────────────────────────────────────────────────────────────
# Window rules
# Match by app_id substring, or prefix with "title:" to match window title.
# ─────────────────────────────────────────────────────────────────────────────
windowrule {
    float    = pavucontrol
    float    = nm-connection-editor
    float    = title:Preferences
    float    = title:Open File
    float    = title:Save As

    noborder = title:zoom
    noborder = title:Zoom Meeting

    opacity  = 0.92 code-oss     # VSCode slight transparency
    opacity  = 0.95 discord

    workspace = 2 firefox
    workspace = 3 code-oss

    size     = 800 600 pavucontrol
}

# ─────────────────────────────────────────────────────────────────────────────
# Monitor configuration
# Name must match the output name shown by wlr-randr or trixiectl status.
# ─────────────────────────────────────────────────────────────────────────────
# monitor eDP-1 {
#     width   = 1920
#     height  = 1080
#     refresh = 60
#     scale   = 1.0
# }

# monitor HDMI-A-1 {
#     width   = 2560
#     height  = 1440
#     refresh = 144
#     scale   = 1.0
# }

# ─────────────────────────────────────────────────────────────────────────────
# Keyboard
# ─────────────────────────────────────────────────────────────────────────────
keyboard {
    layout       = us      # XKB layout  (e.g. gb, de, fr)
    # variant    =         # XKB variant (e.g. dvorak, colemak)
    # options    =         # XKB options (e.g. caps:escape,compose:ralt)
    repeat_rate  = 25      # keys per second after initial delay
    repeat_delay = 600     # milliseconds before key repeat begins
}

# ─────────────────────────────────────────────────────────────────────────────
# Autostart (exec_once runs at startup only; exec runs on every reload)
# ─────────────────────────────────────────────────────────────────────────────
exec_once = ~/.config/trixie/autostart.sh
# exec_once = dunst
# exec_once = nm-applet --indicator
# exec_once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
